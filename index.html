<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheel of Fortune</title>
</head>
<body>
<div class="app">
    <section class="panel">
        <h1>Wheel of Fortune</h1>
        <div class="sub">
            Enter items one per line. The wheel updates when you press Enter or leave the field, and pressing Space spins it when the textarea is not focused.
        </div>

        <label for="items">Wheel items</label>
        <textarea id="items">Pizza
Burger
Sushi
Taco
Kebab
Ramen</textarea>

        <div class="buttons">
            <button id="spinBtn" class="primary">Spin</button>
            <button id="resetBtn" class="danger">Reset</button>
        </div>
    </section>

    <section class="panel wheel-wrap">
        <div class="wheel-box">
            <canvas id="wheel" width="520" height="520"></canvas>
            <div class="pointer"></div>
        </div>
        <div id="result" class="result"></div>
        <div class="hint">
            Focusing the textarea stops the current spin. The current list is stored in the URL, so you can bookmark or share it.
        </div>
    </section>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
